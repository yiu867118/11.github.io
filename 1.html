<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>志愿计划表 - 按组查看</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
      background: linear-gradient(180deg, #eef4ff 0%, #f7f8fc 36%, #f4f6fb 100%);
      color: #0f172a;
      padding: 18px;
    }
    .shell {
      max-width: 1600px;
      margin: 0 auto;
      border-radius: 22px;
      background: rgba(255,255,255,0.9);
      border: 1px solid rgba(148,163,184,0.18);
      box-shadow: 0 20px 60px rgba(15,23,42,0.10);
      overflow: hidden;
      backdrop-filter: blur(10px);
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 18px 22px 12px;
    }
    .title {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .title h1 {
      margin: 0;
      font-size: 22px;
      letter-spacing: -0.02em;
    }
    .title p {
      margin: 0;
      color: #64748b;
      font-size: 13px;
    }
    .actions button {
      border: 1px solid rgba(148,163,184,0.25);
      background: #fff;
      color: #0f172a;
      border-radius: 999px;
      padding: 9px 14px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
    }
    .actions button:hover { border-color: #2563eb; color: #1d4ed8; }
    .stats {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      padding: 0 22px 16px;
    }
    .stat {
      background: linear-gradient(180deg, #ffffff, #f7fbff);
      border: 1px solid rgba(148,163,184,0.18);
      border-radius: 18px;
      padding: 14px 16px;
    }
    .stat .label { color: #64748b; font-size: 12px; margin-bottom: 6px; }
    .stat .value { font-size: 24px; font-weight: 800; letter-spacing: -0.02em; }
    .stat .sub { margin-top: 4px; color: #94a3b8; font-size: 12px; }
    .table-wrap { overflow-x: auto; border-top: 1px solid rgba(148,163,184,0.16); }
    table { width: 100%; min-width: 1320px; border-collapse: collapse; table-layout: fixed; background: #fff; }
    thead th {
      position: sticky;
      top: 0;
      z-index: 4;
      background: linear-gradient(180deg, #eff6ff, #e0f2fe);
      border-bottom: 1px solid rgba(148,163,184,0.22);
    }
    th, td {
      padding: 10px 12px;
      border-bottom: 1px solid #e5e7eb;
      text-align: left;
      font-size: 13px;
      vertical-align: top;
      word-break: break-word;
    }
    th { font-weight: 700; color: #1f2937; }
    td { color: #334155; }
    tbody tr:nth-child(even) { background: #fbfdff; }
    tbody tr:hover { background: #f5faff; }
    tbody tr.dragging { opacity: 0.55; }
    tbody tr.drop-target { outline: 2px solid rgba(37,99,235,0.28); outline-offset: -2px; }
    .seq-col { width: 62px; font-weight: 800; color: #0f172a; }
    .seq-col { cursor: grab; user-select: none; }
    .school-cell { font-weight: 700; color: #0f172a; }
    .major-link {
      color: #1d4ed8;
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
    }
    .major-link:hover { text-decoration: underline; }
    .plan, .score, .rank { font-variant-numeric: tabular-nums; white-space: nowrap; }
    .filter-row th {
      padding: 8px 10px;
      background: linear-gradient(180deg, #f8fbff, #edf5ff);
    }
    .filter-row input {
      width: 100%;
      border: 1px solid rgba(148,163,184,0.25);
      border-radius: 10px;
      padding: 8px 10px;
      font-size: 12px;
      outline: none;
      background: #fff;
    }
    .filter-row input:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37,99,235,0.12);
    }
    .empty {
      padding: 28px 18px;
      text-align: center;
      color: #64748b;
    }
    @media (max-width: 768px) {
      body { padding: 10px; }
      .shell { border-radius: 18px; }
      .topbar { flex-direction: column; align-items: stretch; }
      .stats { grid-template-columns: 1fr; padding: 0 14px 14px; }
      table { min-width: 0; }
      .table-wrap { overflow-x: hidden; }
      thead { display: none; }
      tbody, tr, td { display: block; width: 100%; }
      tr { border-bottom: 1px solid #e5e7eb; }
      td { display: flex; justify-content: space-between; gap: 12px; align-items: flex-start; }
      td::before { content: attr(data-label); font-weight: 700; color: #64748b; flex: 0 0 96px; }
      .seq-col { width: auto; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="topbar">
      <div class="title">
        <h1>志愿计划表</h1>
        <p></p>
      </div>
      <div class="actions">
        <button type="button" id="clearFilters">清空筛选</button>
      </div>
    </div>

    <div class="stats">
      <div class="stat"><div class="label">专业组总数</div><div class="value" id="statGroups">0</div><div class="sub">按原顺序分组</div></div>
      <div class="stat"><div class="label">专业总数</div><div class="value" id="statMajors">0</div><div class="sub">组内专业行</div></div>
    </div>

    <div class="table-wrap">
      <table id="groupTable">
        <thead>
          <tr>
            <th>序号</th>
            <th>院校代码</th>
            <th>院校名称</th>
            <th>地区/城市</th>
            <th>性质</th>
            <th>专业组代码</th>
            <th>专业代码</th>
            <th>招生类型</th>
            <th>专业名称</th>
            <th>选科要求</th>
            <th>2025最低分</th>
            <th>2025位次</th>
            <th>2026计划数</th>
            <th>2025计划数</th>
          </tr>
          <tr class="filter-row">
            <th><input data-filter="seq" placeholder="筛序号"></th>
            <th><input data-filter="schoolCode" placeholder="筛院校代码"></th>
            <th><input data-filter="school" placeholder="筛院校"></th>
            <th><input data-filter="location" placeholder="筛地区"></th>
            <th><input data-filter="nature" placeholder="筛性质"></th>
            <th><input data-filter="groupCode" placeholder="筛组号"></th>
            <th><input data-filter="majorCode" placeholder="筛专业代码"></th>
            <th><input data-filter="admissionType" placeholder="筛类型"></th>
            <th><input data-filter="major" placeholder="筛专业"></th>
            <th><input data-filter="subject" placeholder="筛选科"></th>
            <th><input data-filter="score" placeholder="筛分数"></th>
            <th><input data-filter="rank" placeholder="筛位次"></th>
            <th><input data-filter="plan2026" placeholder="筛2026计划数"></th>
            <th><input data-filter="plan2025" placeholder="筛2025计划数"></th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
  </div>

  <script>
    const state = { rows: [], groups: [], plan2025: new Map(), plan2026: new Map(), headers: [] };
    let draggingGroupIndex = null;

    function normalizeText(value) {
      return String(value || '').toLowerCase().replace(/[\s\-_/，。]/g, '').trim();
    }

    function cleanDisplay(value) {
      return String(value || '').trim().replace(/^\d+\.\s*/, '');
    }

    function stripParentheses(value) {
      return cleanDisplay(value).replace(/[（(].*?[)）]/g, '').replace(/\s+/g, ' ').trim();
    }

    function normalizeSchoolName(value) {
      return normalizeText(stripParentheses(value));
    }

    function normalizeGroup(value) {
      const text = cleanDisplay(value);
      const match = text.match(/(\d+)/);
      return match ? match[1] : text;
    }

    function normalizeMajorName(value) {
      return normalizeText(stripParentheses(value));
    }

    function displayMajorName(value) {
      return stripParentheses(value);
    }

    function toNumber(value) {
      if (value === null || value === undefined || value === '') return null;
      const num = Number(value);
      return Number.isNaN(num) ? null : num;
    }

    function matchesFilter(value, term) {
      const needle = String(term || '').trim().toLowerCase();
      if (!needle) return true;
      return String(value ?? '').toLowerCase().includes(needle);
    }

    async function readWorkbook(url) {
      const res = await fetch(url);
      if (!res.ok) throw new Error(`无法加载文件：${url}`);
      const buffer = await res.arrayBuffer();
      return XLSX.read(buffer, { type: 'array', cellDates: true });
    }

    function inferVolunteerRows(sheet) {
      const raw = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: '' });
      if (!raw.length) return { headers: [], rows: [] };
      const headerRowIdx = raw.findIndex(row => {
        const text = (row || []).join('');
        return text.includes('院校名称') && text.includes('专业名称');
      });
      const headers = (raw[headerRowIdx >= 0 ? headerRowIdx : 0] || []).map(h => cleanDisplay(h));
      const findHeader = (test) => headers.findIndex(h => test(String(h || '')));
      const schoolCodeIdx = findHeader(h => h.includes('院校代码'));
      const schoolNameIdx = findHeader(h => h.includes('院校名称'));
      const locationIdx = findHeader(h => h.includes('地区') || h.includes('城市'));
      const natureIdx = findHeader(h => h.includes('性质'));
      const groupIdx = findHeader(h => h.includes('专业组代码'));
      const majorCodeIdx = findHeader(h => h.includes('专业代码'));
      const admissionTypeIdx = findHeader(h => h.includes('招生类型'));
      const majorNameIdx = findHeader(h => h.includes('专业名称'));
      const subjectIdx = findHeader(h => h.includes('选科要求'));
      const scoreIdx = findHeader(h => h.includes('2025最低分') || h.includes('最低分'));
      const rankIdx = findHeader(h => h.includes('2025位次') || h.includes('最低位') || h.includes('位次'));
      const seqIdx = findHeader(h => h.includes('序号'));

      const rows = [];
      let currentSchool = '';
      let currentGroup = '';
      for (const row of raw.slice((headerRowIdx >= 0 ? headerRowIdx : 0) + 1)) {
        if (!row || !row.length) continue;
        const school = cleanDisplay(row[schoolNameIdx]);
        const group = normalizeGroup(row[groupIdx]);
        if (school) currentSchool = school;
        if (group) currentGroup = group;
        const major = cleanDisplay(row[majorNameIdx]);
        if (!currentSchool || !currentGroup || !major) continue;
        const obj = {};
        headers.forEach((header, index) => { obj[header || `col_${index + 1}`] = row[index]; });
        rows.push({
          order: rows.length + 1,
          seq: seqIdx >= 0 ? row[seqIdx] : '',
          university: currentSchool,
          group: currentGroup,
          rawObj: obj,
          schoolCode: cleanDisplay(row[schoolCodeIdx]),
          location: cleanDisplay(row[locationIdx]),
          nature: cleanDisplay(row[natureIdx]),
          majorCode: cleanDisplay(row[majorCodeIdx]),
          admissionType: cleanDisplay(row[admissionTypeIdx]),
          major: major,
          subject: cleanDisplay(row[subjectIdx]),
          score2025: cleanDisplay(row[scoreIdx]),
          rank2025: cleanDisplay(row[rankIdx])
        });
      }
      return { headers, rows };
    }

    function buildPlanIndex(sheet) {
      const raw = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: '' });
      if (!raw.length) return new Map();
      const headerRowIdx = raw.findIndex(row => {
        const text = (row || []).join('');
        return text.includes('院校名称') && text.includes('专业名称');
      });
      const headers = (raw[headerRowIdx >= 0 ? headerRowIdx : 0] || []).map(h => cleanDisplay(h));
      const findHeader = (test) => headers.findIndex(h => test(String(h || '')));
      const schoolIdx = findHeader(h => h.includes('院校名称'));
      const groupIdx = findHeader(h => h.includes('专业组名称') || h.includes('专业组代码'));
      const majorIdx = findHeader(h => h === '专业名称' || h.endsWith('专业名称'));
      const planIdx = findHeader(h => h.includes('计划人数') || h === '计划人数' || h.includes('计划'));
      const map = new Map();
      for (const row of raw.slice((headerRowIdx >= 0 ? headerRowIdx : 0) + 1)) {
        if (!row || !row.length) continue;
        const school = cleanDisplay(row[schoolIdx]);
        const group = normalizeGroup(row[groupIdx]);
        const major = cleanDisplay(row[majorIdx]);
        const plan = toNumber(row[planIdx]);
        if (!school || !group || !major || plan === null) continue;
        const key = `${normalizeSchoolName(school)}||${normalizeText(group)}`;
        if (!map.has(key)) map.set(key, []);
        map.get(key).push({ major, plan });
      }
      return map;
    }

    function resolveMajorPlan(groupKey, major, planMap) {
      const bucket = planMap.get(groupKey);
      if (!bucket || !bucket.length) return null;
      const majorKey = normalizeMajorName(major);
      const exact = bucket.find(item => normalizeMajorName(item.major) === majorKey);
      if (exact) return exact.plan;
      const loose = bucket.find(item => normalizeMajorName(item.major).includes(majorKey) || majorKey.includes(normalizeMajorName(item.major)));
      if (loose) return loose.plan;
      return resolveTotalPlan(groupKey, planMap);
    }

    function resolveTotalPlan(groupKey, planMap) {
      const bucket = planMap.get(groupKey);
      if (!bucket || !bucket.length) return null;
      return bucket.reduce((sum, item) => sum + item.plan, 0);
    }

    function groupRows(rows) {
      const groups = [];
      let current = null;
      rows.forEach(row => {
        const startNew = row.seq !== '' && row.seq !== null && row.seq !== undefined;
        if (startNew) {
          if (current) groups.push(current);
          current = {
            seq: row.seq || row.order,
            school: row.university,
            groupName: row.group,
            groupKey: `${normalizeSchoolName(row.university)}||${normalizeText(row.group)}`,
            members: [row]
          };
        } else if (current) {
          current.members.push(row);
        }
      });
      if (current) groups.push(current);
      return groups;
    }

    function buildFilterState() {
      const filters = {};
      document.querySelectorAll('.filter-row input[data-filter]').forEach(input => {
        filters[input.dataset.filter] = input.value.trim();
      });
      return filters;
    }

    function openDetail(group, member) {
      const payload = {
        seq: group.seq,
        school: group.school,
        groupName: group.groupName,
        groupKey: group.groupKey,
        major: displayMajorName(member.major),
        majorRaw: member.major,
        schoolCode: member.schoolCode,
        location: member.location,
        nature: member.nature,
        majorCode: member.majorCode,
        admissionType: member.admissionType,
        subject: member.subject,
        score2025: member.score2025,
        rank2025: member.rank2025,
        plan2025: resolveMajorPlan(group.groupKey, member.major, state.plan2025),
        plan2026: resolveMajorPlan(group.groupKey, member.major, state.plan2026),
        rawObj: member.rawObj
      };
      sessionStorage.setItem('volunteerDetailItem', JSON.stringify(payload));
      window.location.href = './detail.html';
    }

    function render() {
      const tbody = document.getElementById('tableBody');
      const filters = buildFilterState();
      const rows = [];
      state.groups.forEach((group, groupIndex) => {
        const displaySeq = groupIndex + 1;
        const members = group.members.filter(member => {
          const majorDisplay = displayMajorName(member.major);
          const plan2026 = resolveMajorPlan(group.groupKey, member.major, state.plan2026);
          const plan2025 = resolveMajorPlan(group.groupKey, member.major, state.plan2025);
          return matchesFilter(displaySeq, filters.seq)
            && matchesFilter(member.schoolCode, filters.schoolCode)
            && matchesFilter(group.school, filters.school)
            && matchesFilter(member.location, filters.location)
            && matchesFilter(member.nature, filters.nature)
            && matchesFilter(group.groupName, filters.groupCode)
            && matchesFilter(member.majorCode, filters.majorCode)
            && matchesFilter(member.admissionType, filters.admissionType)
            && matchesFilter(majorDisplay, filters.major)
            && matchesFilter(member.subject, filters.subject)
            && matchesFilter(member.score2025, filters.score)
            && matchesFilter(member.rank2025, filters.rank)
            && matchesFilter(plan2026, filters.plan2026)
            && matchesFilter(plan2025, filters.plan2025);
        });

        if (!members.length) return;
        const rowspan = members.length;

        members.forEach((member, index) => {
          const majorDisplay = displayMajorName(member.major);
          const plan2026 = resolveMajorPlan(group.groupKey, member.major, state.plan2026);
          const plan2025 = resolveMajorPlan(group.groupKey, member.major, state.plan2025);

          rows.push(`<tr${index === 0 ? ` class="group-row" data-group-index="${groupIndex}" draggable="true"` : ''}>` +
            (index === 0 ? `<td rowspan="${rowspan}" data-label="序号" class="seq-col">${displaySeq}</td>
              <td rowspan="${rowspan}" data-label="院校代码">${member.schoolCode || ''}</td>
              <td rowspan="${rowspan}" data-label="院校名称" class="school-cell">${group.school}</td>
              <td rowspan="${rowspan}" data-label="地区/城市">${member.location || ''}</td>
              <td rowspan="${rowspan}" data-label="性质">${member.nature || ''}</td>
              <td rowspan="${rowspan}" data-label="专业组代码">${group.groupName || ''}</td>` : '') +
            `<td data-label="专业代码">${member.majorCode || ''}</td>` +
            `<td data-label="招生类型">${member.admissionType || ''}</td>` +
            `<td data-label="专业名称"><a class="major-link" href="#" data-group-key="${group.groupKey}" data-member-index="${index}">${majorDisplay}</a></td>` +
            `<td data-label="选科要求">${member.subject || ''}</td>` +
            `<td data-label="2025最低分" class="score">${member.score2025 || ''}</td>` +
            `<td data-label="2025位次" class="rank">${member.rank2025 || ''}</td>` +
            `<td data-label="2026计划" class="plan">${plan2026 ?? '-'}</td>` +
            `<td data-label="2025计划" class="plan">${plan2025 ?? '-'}</td>` +
            `</tr>`);
        });
      });

          tbody.innerHTML = rows.join('') || '<tr><td colspan="14" class="empty">没有匹配到数据</td></tr>';
      document.getElementById('statGroups').textContent = String(state.groups.length);
      document.getElementById('statMajors').textContent = String(state.rows.length);

      tbody.querySelectorAll('tr.group-row').forEach(row => {
        row.addEventListener('dragstart', event => {
          draggingGroupIndex = Number(row.dataset.groupIndex);
          row.classList.add('dragging');
          event.dataTransfer.effectAllowed = 'move';
          try { event.dataTransfer.setData('text/plain', String(draggingGroupIndex)); } catch (error) {}
        });
        row.addEventListener('dragend', () => {
          draggingGroupIndex = null;
          row.classList.remove('dragging');
          tbody.querySelectorAll('.drop-target').forEach(target => target.classList.remove('drop-target'));
        });
        row.addEventListener('dragover', event => {
          event.preventDefault();
          row.classList.add('drop-target');
        });
        row.addEventListener('dragleave', () => row.classList.remove('drop-target'));
        row.addEventListener('drop', event => {
          event.preventDefault();
          row.classList.remove('drop-target');
          if (draggingGroupIndex === null) return;
          const targetIndex = Number(row.dataset.groupIndex);
          if (Number.isNaN(targetIndex) || draggingGroupIndex === targetIndex) return;
          const [moved] = state.groups.splice(draggingGroupIndex, 1);
          state.groups.splice(targetIndex, 0, moved);
          draggingGroupIndex = null;
          render();
        });
      });

      tbody.querySelectorAll('.major-link').forEach(link => {
        link.addEventListener('click', event => {
          event.preventDefault();
          const groupKey = link.dataset.groupKey;
          const memberIndex = Number(link.dataset.memberIndex || '0');
          const group = state.groups.find(item => item.groupKey === groupKey);
          if (!group) return;
          const member = group.members[memberIndex] || group.members[0];
          openDetail(group, member);
        });
      });
    }

    async function loadAndRender() {
      const volunteerCandidates = [
        './志愿.xlsx',
        './1782474422志愿202606261-20260626194702.xlsx',
        './1782474422志愿202606261-20260626194702 (1).xlsx',
        './1782470511志愿202606261-20260626184151.xlsx'
      ];

      let volunteerWorkbook = null;
      for (const url of volunteerCandidates) {
        try {
          volunteerWorkbook = await readWorkbook(url);
          break;
        } catch (error) {
          continue;
        }
      }
      if (!volunteerWorkbook) throw new Error('未找到志愿表文件');

      const plan2025Workbook = await readWorkbook('./2025招生计划.xlsx');
      const plan2026Workbook = await readWorkbook('./吉林2026年招生计划.xlsx');

      const parsed = inferVolunteerRows(volunteerWorkbook.Sheets[volunteerWorkbook.SheetNames[0]]);
      state.headers = parsed.headers;
      state.rows = parsed.rows;
      state.groups = groupRows(parsed.rows);
      state.plan2025 = buildPlanIndex(plan2025Workbook.Sheets[plan2025Workbook.SheetNames[0]]);
      state.plan2026 = buildPlanIndex(plan2026Workbook.Sheets[plan2026Workbook.SheetNames[0]]);
      render();
    }

    document.querySelectorAll('.filter-row input[data-filter]').forEach(input => input.addEventListener('input', render));
    document.getElementById('clearFilters').addEventListener('click', () => {
      document.querySelectorAll('.filter-row input[data-filter]').forEach(input => input.value = '');
      render();
    });

    loadAndRender().catch(error => {
      document.getElementById('tableBody').innerHTML = `<tr><td colspan="15" class="empty">加载失败：${error.message}</td></tr>`;
    });
  </script>
</body>
</html>
