<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>专业详情</title>
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
      background: linear-gradient(180deg, #eef4ff 0%, #f7f8fc 36%, #f4f6fb 100%);
      color: #0f172a;
      padding: 18px;
    }
    .shell {
      max-width: 980px;
      margin: 0 auto;
      border-radius: 22px;
      background: rgba(255,255,255,0.92);
      border: 1px solid rgba(148,163,184,0.18);
      box-shadow: 0 20px 60px rgba(15,23,42,0.10);
      overflow: hidden;
      backdrop-filter: blur(10px);
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 18px 22px 12px;
    }
    .back {
      border: 1px solid rgba(148,163,184,0.25);
      background: #fff;
      color: #0f172a;
      border-radius: 999px;
      padding: 9px 14px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
    }
    .back:hover { border-color: #2563eb; color: #1d4ed8; }
    .hero {
      padding: 0 22px 18px;
    }
    .hero h1 {
      margin: 0 0 8px;
      font-size: 26px;
      line-height: 1.2;
      letter-spacing: -0.03em;
    }
    .hero .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      color: #64748b;
      font-size: 13px;
    }
    .chip {
      display: inline-flex;
      align-items: center;
      padding: 5px 10px;
      border-radius: 999px;
      background: rgba(37,99,235,0.08);
      color: #1d4ed8;
      font-weight: 700;
    }
    .card {
      margin: 0 22px 22px;
      border: 1px solid rgba(148,163,184,0.18);
      border-radius: 20px;
      overflow: hidden;
      background: #fff;
    }
    .card-head {
      padding: 16px 18px;
      border-bottom: 1px solid #e5e7eb;
      background: linear-gradient(180deg, #ffffff, #f8fbff);
    }
    .card-title {
      margin: 0;
      font-size: 18px;
      font-weight: 800;
      letter-spacing: -0.02em;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 0;
    }
    .item {
      padding: 14px 16px;
      border-top: 1px solid #eef2f7;
      border-right: 1px solid #eef2f7;
    }
    .item:nth-child(2n) { border-right: 0; }
    .label { color: #64748b; font-size: 12px; margin-bottom: 6px; font-weight: 700; }
    .value { font-size: 14px; color: #0f172a; line-height: 1.55; word-break: break-word; }
    .value.mono { font-variant-numeric: tabular-nums; }
    .sections {
      margin: 0 22px 22px;
      display: grid;
      gap: 14px;
    }
    .section {
      border: 1px solid rgba(148,163,184,0.18);
      border-radius: 18px;
      overflow: hidden;
      background: #fff;
    }
    .section h2 {
      margin: 0;
      padding: 14px 16px;
      font-size: 15px;
      border-bottom: 1px solid #e5e7eb;
      background: linear-gradient(180deg, #ffffff, #f8fbff);
    }
    .list {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }
    .list .item { border-top: 1px solid #eef2f7; }
    .empty {
      margin: 22px;
      padding: 20px;
      border-radius: 18px;
      background: #fff;
      border: 1px solid rgba(148,163,184,0.18);
      color: #64748b;
    }
    @media (max-width: 768px) {
      body { padding: 10px; }
      .shell { border-radius: 18px; }
      .topbar { flex-direction: column; align-items: stretch; }
      .grid, .list { grid-template-columns: 1fr; }
      .item { border-right: 0; }
      .hero, .card, .sections, .empty { margin-left: 14px; margin-right: 14px; }
      .hero h1 { font-size: 22px; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="topbar">
      <button class="back" type="button" onclick="history.back()">返回列表</button>
      <div class="chip" id="planChip">专业详情</div>
    </div>

    <div id="content"></div>
  </div>

  <script>
    const payload = (() => {
      try {
        return JSON.parse(sessionStorage.getItem('volunteerDetailItem') || 'null');
      } catch {
        return null;
      }
    })();

    const content = document.getElementById('content');

    if (!payload) {
      content.innerHTML = '<div class="empty">没有可显示的详情，请返回列表后点击某个专业名称。</div>';
    } else {
      document.title = `${payload.major || '专业详情'} - 详情`;
      document.getElementById('planChip').textContent = `${payload.school || ''} · ${payload.groupName || ''}`;
      const rawEntries = Object.entries(payload.rawObj || {}).filter(([, value]) => value !== undefined && value !== null && String(value).trim() !== '');
      const summary = [
        ['院校名称', payload.school],
        ['专业组代码', payload.groupName],
        ['专业名称', payload.major],
        ['院校代码', payload.schoolCode],
        ['专业代码', payload.majorCode],
        ['招生类型', payload.admissionType],
        ['选科要求', payload.subject],
        ['2025最低分', payload.score2025],
        ['2025位次', payload.rank2025],
        ['2026计划数', payload.plan2026],
        ['2025计划数', payload.plan2025]
      ];

      content.innerHTML = `
        <div class="hero">
          <h1>${payload.major || '专业详情'}</h1>
          <div class="meta">
            <span class="chip">${payload.school || ''}</span>
            <span class="chip">${payload.groupName || ''}</span>
            <span>点击专业名称进入此页</span>
          </div>
        </div>

        <div class="card">
          <div class="card-head">
            <p class="card-title">核心信息</p>
          </div>
          <div class="grid">
            ${summary.map(([label, value]) => `
              <div class="item">
                <div class="label">${label}</div>
                <div class="value ${label.includes('位次') || label.includes('计划') || label.includes('分') ? 'mono' : ''}">${value ?? ''}</div>
              </div>
            `).join('')}
          </div>
        </div>

        <div class="sections">
          <div class="section">
            <h2>原始字段</h2>
            <div class="list">
              ${rawEntries.map(([label, value]) => `
                <div class="item">
                  <div class="label">${label}</div>
                  <div class="value">${String(value)}</div>
                </div>
              `).join('')}
            </div>
          </div>
        </div>
      `;
    }
  </script>
</body>
</html>
